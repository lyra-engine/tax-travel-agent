name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Astro 6 requires Node >= 22.12 (enforced in CI environments).
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
